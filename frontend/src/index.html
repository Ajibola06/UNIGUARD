<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniGuard • Professional Security Intelligence</title>
    
    <!-- Google Fonts - Professional & Clean -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ========== GLOBAL STYLES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(145deg, #0B1120 0%, #0F172A 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* ========== ANIMATED BACKGROUND ========== */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s infinite ease-in-out;
        }

        .orb1 {
            width: 600px;
            height: 600px;
            background: #3B82F6;
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .orb2 {
            width: 500px;
            height: 500px;
            background: #8B5CF6;
            bottom: -200px;
            right: -200px;
            animation-delay: -5s;
        }

        .orb3 {
            width: 400px;
            height: 400px;
            background: #06B6D4;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, 50px) scale(1.1); }
            50% { transform: translate(-30px, 20px) scale(0.9); }
            75% { transform: translate(20px, -30px) scale(1.05); }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.1) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.1) 1px, transparent 1px),
                radial-gradient(circle at 40% 80%, rgba(6, 182, 212, 0.1) 1px, transparent 1px),
                radial-gradient(circle at 90% 20%, rgba(59, 130, 246, 0.1) 1px, transparent 1px);
            background-size: 100px 100px;
            animation: particleMove 40s linear infinite;
            opacity: 0.3;
        }

        @keyframes particleMove {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }

        /* ========== LOGIN CONTAINER ========== */
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .login-header {
            padding: 32px 32px 16px 32px;
            text-align: center;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo i {
            font-size: 2.2rem;
            color: #3B82F6;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.3));
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: #94A3B8;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .login-body {
            padding: 32px;
        }

        /* ========== DEMO CREDENTIALS ========== */
        .demo-credentials {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(59, 130, 246, 0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .demo-credentials h4 {
            color: #E2E8F0;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .demo-credentials ul {
            list-style: none;
            display: flex;
            gap: 12px;
        }

        .demo-credentials li {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            padding: 12px;
            color: #CBD5E1;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .demo-credentials li:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: #3B82F6;
            transform: translateY(-2px);
        }

        .demo-credentials strong {
            color: #3B82F6;
            display: block;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        /* ========== FORM ELEMENTS ========== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #CBD5E1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748B;
            font-size: 0.95rem;
        }

        .input-with-icon input {
            width: 100%;
            padding: 14px 14px 14px 48px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 14px;
            font-size: 0.95rem;
            color: #F1F5F9;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.2s ease;
        }

        .input-with-icon input:focus {
            outline: none;
            border-color: #3B82F6;
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .input-with-icon input::placeholder {
            color: #64748B;
            font-size: 0.9rem;
        }

        /* ========== BUTTON ========== */
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            margin-top: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
        }

        .loading.active {
            display: inline-block;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ========== ERROR MESSAGE ========== */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #FCA5A5;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 480px) {
            .login-container {
                padding: 16px;
            }
            
            .login-body {
                padding: 24px;
            }
            
            .demo-credentials ul {
                flex-direction: column;
                gap: 8px;
            }
            
            .logo h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
        <div class="particles"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-shield-hal"></i>
                    <h1>Babcock University</h1>
                </div>
                <p>Intelligent Misconduct Prediction System</p>
            </div>

            <div class="login-body">
                <div class="demo-credentials">
                    <h4>Quick Access</h4>
                    <ul>
                        <li onclick="fillCredentials('admin', 'admin123')">
                            <strong>Administrator</strong>
                            admin / admin123
                        </li>
                        <li onclick="fillCredentials('warden', 'warden123')">
                            <strong>Porter</strong>
                            warden / warden123
                        </li>
                    </ul>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Username</label>
                        <div class="input-with-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" id="username" placeholder="Enter your username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Enter your password" required>
                        </div>
                    </div>

                    <div id="errorMessage" class="error-message"></div>

                    <button type="submit" class="login-btn" id="loginButton">
                        <span id="loginText">Sign In</span>
                        <i class="fas fa-arrow-right" id="loginIcon"></i>
                        <i class="fas fa-spinner loading" id="loginSpinner"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function fillCredentials(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginButton = document.getElementById('loginButton');
            const loginText = document.getElementById('loginText');
            const loginIcon = document.getElementById('loginIcon');
            const loginSpinner = document.getElementById('loginSpinner');
            const errorMessage = document.getElementById('errorMessage');
            
            loginButton.disabled = true;
            loginText.textContent = 'Signing in...';
            loginIcon.style.display = 'none';
            loginSpinner.classList.add('active');
            errorMessage.classList.remove('show');
            
            try {
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    loginText.textContent = 'Success! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);
                } else {
                    throw new Error(data.error || 'Invalid credentials');
                }
                
            } catch (error) {
                if (error.message === 'Failed to fetch') {
                    errorMessage.textContent = 'Cannot connect to server. Please ensure backend is running.';
                } else {
                    errorMessage.textContent = error.message;
                }
                errorMessage.classList.add('show');
                
                loginText.textContent = 'Sign In';
                loginIcon.style.display = 'inline-block';
            } finally {
                loginButton.disabled = false;
                loginSpinner.classList.remove('active');
            }
        });
    </script>
</body>
</html>
